# ============================================================
# 06 - Environment variables & Secrets
# How to define config values, and how to use SECRETS safely.
# ============================================================

name: 06 - Env and Secrets

on:
  workflow_dispatch:

# "env" at the top level applies to EVERY job/step in the workflow.
env:
  GREETING: "Hello from a workflow-level variable"

jobs:
  show-config:
    runs-on: ubuntu-latest

    # "env" here applies only to THIS job (overrides/extends the top one).
    env:
      STAGE: "demo"

    steps:
      - name: Read environment variables
        # Inside "run", env vars are used with normal shell syntax: $NAME.
        run: |
          echo "Workflow-level: $GREETING"
          echo "Job-level:      $STAGE"

      - name: A step can have its own env too
        env:
          STEP_VAR: "only this step can see me"
        run: echo "$STEP_VAR"

      # ---- SECRETS ------------------------------------------------------
      # Secrets are encrypted values you store in:
      #   GitHub repo -> Settings -> Secrets and variables -> Actions.
      # You reference them with ${{ secrets.NAME }}.
      # GitHub automatically MASKS them in logs (shown as ***).
      #
      # This demo uses a secret called MY_API_KEY. If you haven't created
      # one, the value will simply be empty — the workflow still runs.
      - name: Use a secret
        env:
          # Best practice: map the secret into an env var, don't inline it
          # directly into the shell command.
          API_KEY: ${{ secrets.MY_API_KEY }}
        run: |
          if [[ -z "$API_KEY" ]]; then
            echo "No MY_API_KEY secret is set (that's fine for this demo)."
          else
            echo "Got a secret of length ${#API_KEY}. Its value is masked: $API_KEY"
          fi
