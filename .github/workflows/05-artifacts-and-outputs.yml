# ============================================================
# 05 - Artifacts & Outputs
# Two ways to pass data between steps/jobs:
#   1. step OUTPUTS  -> small values (strings) within the same run
#   2. ARTIFACTS     -> files you can download from the run page
# ============================================================

name: 05 - Artifacts and Outputs

on:
  workflow_dispatch:

jobs:
  producer:
    runs-on: ubuntu-latest
    # "outputs" exposes values from this job so OTHER jobs can read them.
    outputs:
      build-id: ${{ steps.make-id.outputs.id }}
    steps:
      - name: Generate a value and expose it as a step output
        id: make-id   # we reference this id below
        run: |
          # Writing "key=value" to the special $GITHUB_OUTPUT file
          # is how a step publishes an output.
          echo "id=build-$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Create a file to save as an artifact
        run: |
          mkdir -p out
          echo "This file was built by GitHub Actions." > out/report.txt
          echo "Build id: ${{ steps.make-id.outputs.id }}" >> out/report.txt

      # upload-artifact saves files so you can download them from the
      # run summary page, or have another job pick them up.
      - name: Upload the artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-report
          path: out/

  consumer:
    runs-on: ubuntu-latest
    needs: producer
    steps:
      # Read the output that the "producer" job exposed.
      - name: Use the upstream job's output
        # Note: this is a block scalar (|). A single-line `run:` value can't
        # contain a colon-space ("built: ") — YAML would read it as a new key.
        run: |
          echo "The producer job built: ${{ needs.producer.outputs.build-id }}"

      # Download the artifact that the producer uploaded.
      - name: Download the artifact
        uses: actions/download-artifact@v4
        with:
          name: build-report

      - name: Show the downloaded file
        run: cat report.txt
